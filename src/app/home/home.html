<app-preloader/>
<app-header/>

<section id="home" class="hero-style" *ngIf="profileService.config() as info">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-12 text-center">

        <div class="profile-img-container mb-4" *ngIf="info.photoPath">
          <img [src]="info.photoPath" 
               alt="Photo de profil" 
               class="img-fluid"
               style="width: 220px; height: 220px; object-fit: cover; border-radius: 50%; border: 6px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        </div>

        <h1>Bonjour, je suis <span class="accent">{{ info.firstName }} {{ info.lastName }}</span></h1>
        <p class="mt-3">{{ info.jobTitle }}</p>

      </div>
    </div>
  </div>
</section>

<div *ngIf="!profileService.config()">
  <p>Chargement... (ou lancez le script setup.js)</p>
</div>

<main class="content center-main" >
  <!-- <app-introduction/> -->
  <app-about/>
  <app-facts/>
  <app-services/>
  <app-movie/>
  <app-portfolio/>
  <app-projet/>
  <app-resume/>
  <app-testimonial/>
  <app-blog/>
  <app-contact/>
  <app-footer/>
</main>

<!--To Top Link START-->
<a href="#" class="toTop" id="return-to-top">
  <i class="fas fa-chevron-up"></i>
</a>
<!--To Top Link END-->
